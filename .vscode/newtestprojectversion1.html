<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DataTable Sample - Editable</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- DataTables CSS -->
  <link href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" rel="stylesheet">

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    /* Example of your custom CSS inline */
    body {
      background-color: #f8f9fa;
    }
    .btn-primary-first {
      background-color: #007bff;
      color: #fff;
    }
  </style>
</head>
<body>

<div class="container mt-4">
  <h1 class="mb-3 text-center">Sample Data Table</h1>

  <!-- Add User Button -->
  <div class="card p-3 mb-4 text-center">
    <h5>Add User (+)</h5>
    <div class="col-md-2 mx-auto">
      <button type="button" class="btn btn-primary-first w-100" data-bs-toggle="modal" data-bs-target="#exampleModalCenter">
        Add User
      </button>
    </div>
  </div>

  <!-- Table -->
  <table id="myTable" class="table table-striped">
    <thead>
      <tr>
        <th>ID</th>
        <th>Pangalan</th>
        <th>Email</th>
        <th>Edad</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- Modal -->
<div class="modal fade" id="exampleModalCenter" tabindex="-1" aria-labelledby="exampleModalCenterTitle" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header text-center">
        <h5 class="modal-title" id="exampleModalCenterTitle">Add User</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <!-- Form inside modal -->
        <form id="myForm" class="needs-validation" novalidate>
          <div class="mb-3">
            <label for="userId" class="form-label">ID:</label>
            <input type="text" class="form-control" id="userId" required>
            <div class="invalid-feedback">Please put an ID.</div>
          </div>
          <div class="mb-3">
            <label for="userName" class="form-label">Name:</label>
            <input type="text" class="form-control" id="userName" required>
            <div class="invalid-feedback">Please put a name.</div>
          </div>
          <div class="mb-3">
            <label for="userEmail" class="form-label">Email:</label>
            <input type="email" class="form-control" id="userEmail" required>
            <div class="invalid-feedback">Please put a valid email.</div>
          </div>
          <div class="mb-3">
            <label for="userAge" class="form-label">Age:</label>
            <input type="number" class="form-control" id="userAge" required>
            <div class="invalid-feedback">Please put an age.</div>
          </div>
          <button class="btn btn-primary" type="submit">Save changes</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

<!-- DataTables JS -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<!-- Bootstrap 5 JS bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    
$(document).ready(function () {

  // Initial data
  const tableRows = [
    { "id": "1", "name": "Pablo", "email": "montecarlotechnologies@email.com", "age": "29" },
    { "id": "2", "name": "Prince Edward Guevara", "email": "guevaraprinceedward@email.com", "age": "16" },
    { "id": "3", "name": "Web Master", "email": "webmaster@email.com", "age": "???" }
  ];

  // Initialize DataTable

  const table = $('#myTable').DataTable({

    data: tableRows,

    columns: [
      { data: 'id', title: 'ID' },
      { data: 'name', title: 'Username' },
      { data: 'email', title: 'Email' },
      { data: 'age', title: 'Age' },
      {
        data: null,
        title: 'Action',
        render: function () {
          return `
            <button class="btn btn-sm btn-warning editBtn">Edit</button>
            <button class="btn btn-sm btn-danger deleteBtn">Delete</button>
          `;
        }
      }
    ]
  });

  // Handle Delete

  $('#myTable tbody').on('click', '.deleteBtn', function () {
    table.row($(this).parents('tr')).remove().draw();
  });

  // Handle Edit

  $('#myTable tbody').on('click', '.editBtn', function () {
    const row = table.row($(this).parents('tr'));
    const data = row.data();
    $('#userId').val(data.id);
    $('#userName').val(data.name);
    $('#userEmail').val(data.email);
    $('#userAge').val(data.age);
    row.remove().draw();
    var modal = new bootstrap.Modal(document.getElementById('exampleModalCenter'));
    modal.show();
  });

  // Form validation + redirect

  (function () {
    const form = document.getElementById('myForm');
    form.addEventListener('submit', function (event) {

      if (!form.checkValidity()) {
        event.preventDefault();
        event.stopPropagation();

      } else {
        event.preventDefault();

        // Add new user to DataTable

        const newUser = {
          id: $('#userId').val().trim(),
          name: $('#userName').val().trim(),
          email: $('#userEmail').val().trim(),
          age: $('#userAge').val().trim()
        };
        table.row.add(newUser).draw();

        // Reset form and close modal

        form.reset();
        var modal = bootstrap.Modal.getInstance(document.getElementById('exampleModalCenter'));
        modal.hide();


      }
                form.classList.add('was-validated');
            }, false);
    })();
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DataTable Sample - Editable with Image</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- DataTables CSS -->
  <link href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" rel="stylesheet">

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body { background-color: #f8f9fa; }
    .btn-primary-first { background-color: #007bff; color: #fff; }
    #previewImage { max-width: 100px; display: none; margin-top: 10px; }
  </style>
</head>
<body>

<div class="container mt-4">
  <h1 class="mb-3 text-center">Sample Data Table</h1>

  <!-- Add User Button -->
  <div class="card p-3 mb-4 text-center">
    <h5>Add User (+)</h5>
    <div class="col-md-2 mx-auto">
      <button type="button" class="btn btn-primary-first w-100" data-bs-toggle="modal" data-bs-target="#exampleModalCenter">
        Add User
      </button>
    </div>
  </div>

  <!-- Table -->
  <table id="myTable" class="table table-striped">
    <thead>

      <tr>

        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Age</th>
        <th>Image</th>
        <th>Action</th>
      </tr>

    </thead>

    <tbody></tbody>
    
  </table>
</div>

<!-- Modal -->
<div class="modal fade" id="exampleModalCenter" tabindex="-1" aria-labelledby="exampleModalCenterTitle" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header text-center">
        <h5 class="modal-title" id="exampleModalCenterTitle">Add User</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="addUserForm">
          <div class="mb-3">
            <label for="userId" class="form-label">ID:</label>
            <input type="text" class="form-control" id="userId" required>
          </div>
          <div class="mb-3">
            <label for="userName" class="form-label">Name:</label>
            <input type="text" class="form-control" id="userName" required>
          </div>
          <div class="mb-3">
            <label for="userEmail" class="form-label">Email:</label>
            <input type="email" class="form-control" id="userEmail" required>
          </div>
          <div class="mb-3">
            <label for="userAge" class="form-label">Age:</label>
            <input type="number" class="form-control" id="userAge" required>
          </div>
          <div class="mb-3">
            <label for="userImage" class="form-label">Upload ID Picture:</label>
            <input type="file" class="form-control" id="userImage" accept="image/*">
            <img id="previewImage" alt="Preview">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary" id="saveUserBtn">Save changes</button>
      </div>
    </div>
  </div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<!-- DataTables JS -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<!-- Bootstrap 5 JS bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
$(document).ready(function () {
  // Initial data
  const tableRows = [
    { "id": "1", "name": "Pablo", "email": "pablo@email.com", "age": "29", "image": "" },
    { "id": "2", "name": "Prince Edward", "email": "prince@email.com", "age": "16", "image": "" }
  ];

  // Initialize DataTable
  const table = $('#myTable').DataTable({
    data: tableRows,
    columns: [
      { data: 'id', title: 'ID' },
      { data: 'name', title: 'Username' },
      { data: 'email', title: 'Email' },
      { data: 'age', title: 'Age' },
      {
        data: 'image',
        title: 'Image',
        render: function (data) {
          return data ? `<img src="${data}" style="max-width:50px;">` : '';
        }
      },
      {
        data: null,
        title: 'Action',
        render: function () {
          return `
            <button class="btn btn-sm btn-warning editBtn">Edit</button>
            <button class="btn btn-sm btn-danger deleteBtn">Delete</button>
          `;
        }
      }
    ]
  });

  // Preview selected image
  $('#userImage').on('change', function (event) {
    const file = event.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function (e) {
        $('#previewImage').attr('src', e.target.result).show();
      };
      reader.readAsDataURL(file);
    }
  });

  // Save User
  $('#saveUserBtn').on('click', function () {
    const newUser = { 
        id: $('#userId').val().trim(), 
        name: $('#userName').val().trim(), 
        email: $('#userEmail').val().trim(), 
        age: $('#userAge').val().trim(), 
        image: $('#previewImage').attr('src') || "" // allow empty 
        };
    
        // Exception
    if (!newUser.id || !newUser.name || !newUser.email || !newUser.age || !newUser.image) {
        Swal.fire({
            title: "Oops!",
            text: "Please fill in all fields and upload an image.",
            icon: "error"
        });
            return;
        }


        // ID Duplication Error
    const existingIds = table.column(0).data().toArray();
    if (existingIds.includes(newUser.id)) {
      Swal.fire({ title: "Duplicate ID", text: "This ID already exists.", icon: "warning" });
      return;
    }

    table.row.add(newUser).draw();

    $('#addUserForm')[0].reset();
    $('#previewImage').hide();
    var modal = bootstrap.Modal.getInstance(document.getElementById('exampleModalCenter'));
    modal.hide();

    Swal.fire({ title: "Good job!", text: "User added successfully!", icon: "success" });
  });

  // Delete
  $('#myTable tbody').on('click', '.deleteBtn', function () {
    table.row($(this).parents('tr')).remove().draw();
  });

  // Edit
  $('#myTable tbody').on('click', '.editBtn', function () {
    const row = table.row($(this).parents('tr'));
    const data = row.data();
    $('#userId').val(data.id);
    $('#userName').val(data.name);
    $('#userEmail').val(data.email);
    $('#userAge').val(data.age);
    if (data.image) {
      $('#previewImage').attr('src', data.image).show();
    }
    row.remove().draw();
    var modal = new bootstrap.Modal(document.getElementById('exampleModalCenter'));
    modal.show();
  });
});
</script>

</body>
</html>

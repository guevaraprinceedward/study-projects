<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DataTable Sample - One File</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- DataTables CSS -->
    <link href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h1 class="mb-3 text-center">Sample DataTable</h1>

    <!-- Add User Form -->
    <div class="card p-3 mb-4">
        <h5>Magdagdag ng User</h5>
        <form id="addUserForm" class="row g-3">
            <div class="col-md-2">
                <input type="text" id="userId" class="form-control" placeholder="ID" required>
            </div>
            <div class="col-md-3">
                <input type="text" id="userName" class="form-control" placeholder="Pangalan" required>
            </div>
            <div class="col-md-3">
                <input type="email" id="userEmail" class="form-control" placeholder="Email" required>
            </div>
            <div class="col-md-2">
                <input type="number" id="userAge" class="form-control" placeholder="Edad" required>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">Add User</button>
            </div>
        </form>
    </div>

    <!-- Table -->
    <table id="myTable" class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Pangalan</th>
                <th>Email</th>
                <th>Edad</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

<!-- DataTables JS -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script>
$(document).ready(function () {
    // Initial data
    const tableRows = [
        { "id": "1", "name": "Juan Dela Cruz", "email": "juan@email.com", "age": "25" },
        { "id": "2", "name": "Maria Santos", "email": "maria@email.com", "age": "22" },
        { "id": "3", "name": "Pedro Reyes", "email": "pedro@email.com", "age": "30" }
    ];

    // Initialize DataTable
    const table = $('#myTable').DataTable({
        data: tableRows,
        columns: [
            { data: 'id', title: 'ID' },
            { data: 'name', title: 'Pangalan' },
            { data: 'email', title: 'Email' },
            { data: 'age', title: 'Edad' },
        ]
    });

    // Handle Add User Form
    $('#addUserForm').on('submit', function (e) {
        e.preventDefault();

        // Get values from form
        const newUser = {
            id: $('#userId').val(),
            name: $('#userName').val(),
            email: $('#userEmail').val(),
            age: $('#userAge').val()
        };

        // Add to DataTable
        table.row.add(newUser).draw();

        // Clear form
        this.reset();
    });
});
</script>

</body>
</html>

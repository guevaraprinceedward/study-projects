<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Form Redirect Example</title>
  <!-- Bootstrap 5 CSS for styling and validation classes -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div style="margin: 45px;"> 

  <!-- The form element -->

  <form id="myForm" class="row g-3 needs-validation" novalidate>

    <!-- Each input has the "required" attribute so the browser checks if it's filled -->

    <div class="col-md-4">
      <label for="validationCustom01" class="form-label">First name</label>
      <input type="text" class="form-control" id="validationCustom01" required>

      <div class="invalid-feedback"> Please put a first name. </div>
      <div class="valid-feedback">Looks good!</div>

    </div>

    <div class="col-md-4">
      <label for="validationCustom02" class="form-label">Last name</label>
      <input type="text" class="form-control" id="validationCustom02" required>

      <div class="invalid-feedback"> Please put a last name. </div>
      <div class="valid-feedback">Looks good!</div>

    </div>

    <div class="col-md-4">
      <label for="validationCustomUsername" class="form-label">Username</label>
      <div class="input-group has-validation">
        <span class="input-group-text">@</span>
        <input type="text" class="form-control" id="validationCustomUsername" required>

        <div class="invalid-feedback">Please choose a username.</div>

      </div>
    </div>

    <!-- More fields (City, State, Zip, Checkbox) -->
    <div class="col-md-6">
      <label for="validationCustom03" class="form-label">City</label>
      <input type="text" class="form-control" id="validationCustom03" required>

      <div class="invalid-feedback">Please provide a valid city or province.</div>

    </div>

    <div class="col-md-3">
      <label for="validationCustom04" class="form-label">State</label>
      <select class="form-select" id="validationCustom04" required>

        <option selected disabled value=""> Choose...</option>

        <option> Philippines </option>
        <option> Korea </option>
        <option> United States </option>
        <option> Germany </option>

      </select>

      <div class="invalid-feedback">Please select a valid state or country.</div>

    </div>

    <div class="col-md-3">
      <label for="validationCustom05" class="form-label">Zip</label>
      <input type="text" class="form-control" id="validationCustom05" required>

      <div class="invalid-feedback">Please provide a valid zip.</div>

    </div>

    <div class="col-12">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="invalidCheck" required>
        <label class="form-check-label" for="invalidCheck">
          Agree to terms and conditions
        </label>

        <div class="invalid-feedback">You must agree before submitting.</div>

      </div>
    </div>

    <!-- Submit button -->
    <div class="col-12">
      <button class="btn btn-primary" type="submit">Submit form</button>
    </div>
  </form>
</div>

<!-- Bootstrap JS bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Wrap code in an IIFE (Immediately Invoked Function Expression)

    (function () {

    // Get the form element by ID

    const form = document.getElementById('myForm');

    // Add an event listener for the "submit" event

    form.addEventListener('submit', function (event) {

      // If the form is invalid (some required fields are empty)

      if (!form.checkValidity()) {

        // Prevent the default submit (no redirect yet)

        event.preventDefault();
        event.stopPropagation();

      } else {

        // If the form is valid (all required fields filled)

        event.preventDefault(); // prevent default submit

        // Redirect to another website

        window.location.href = "https://www.instagram.com/arii._trs/"; 
      }

      // Add Bootstrap class to show validation feedback

      form.classList.add('was-validated');
    }, false);
  })();
</script>

</body>
</html>
